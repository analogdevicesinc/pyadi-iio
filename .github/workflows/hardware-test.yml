name: Hardware Tests (GHA)

# Net-new GHA HW pipeline running alongside JenkinsfileHW during migration.
# Calls the shared HW-CI workflow in tfcollins/labgrid-plugins.
#
# Triggered by:
#   * workflow_dispatch (manual)
#   * PRs labeled `hw-test` — keeps every push from burning lab time
#   * Nightly cron at 08:00 UTC
#
# Initial scope: `pluto` and `fmcomms2-zcu102` places (coord leg only).
# Add boards by extending .github/hw-nodes.json and test/hw/.

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * *"

jobs:
  hw:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'hw-test')
    uses: tfcollins/labgrid-plugins/.github/workflows/hw-matrix.yml@v1
    with:
      manifest_path: .github/hw-nodes.json
      venv_install_cmd: |
        uv pip install --quiet --python "$VENV_DIR/bin/python" \
          -r requirements_dev.txt
        uv pip install --quiet --python "$VENV_DIR/bin/python" -e .
        uv pip install --quiet --python "$VENV_DIR/bin/python" \
          "labgrid @ git+https://github.com/tfcollins/labgrid.git@81c35eda6436af63d3acf7f8b98893abae0bbbca"
      pytest_cmd_template: >-
        "$VENV_DIR/bin/pytest" -v $TESTS --junitxml="$JUNIT"
      artifact_glob: |
        junit-hw-*.xml
        **/*.log
      legs: coord
      prism_project: pyadi-iio
    secrets: inherit
