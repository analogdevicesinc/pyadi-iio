## pyadi-iio hardware-CI env for AD9081 + ZCU102 via the `mini2` remote
## place on the labgrid coordinator.
##
## Run locally:
##   labgrid-client -x 10.0.0.41:20408 -p mini2 acquire
##   LG_COORDINATOR=10.0.0.41:20408 LG_ENV=test/hw/env/mini2.yaml \
##     pytest -vs --skip-scan -p no:cacheprovider \
##            -m zynqmp_zcu102_rev10_ad9081_m8_l4
##   labgrid-client -x 10.0.0.41:20408 -p mini2 release
##
## `features:` drives the skip-logic in test/conftest.py's labgrid
## iio_uri override — keep at least one entry overlapping with each
## test's @pytest.mark.iio_hardware(...) key (e.g. `ad9081`).

targets:
  main:
    features:
      - ad9081
      - adrv9009
      - zcu102
    resources:
      RemotePlace:
        name: mini2
    drivers:
      VesyncPowerDriver: {}
      USBSDMuxDriver: {}
      SerialDriver: {}
      ADIShellDriver:
        prompt: 'root@.*'
        login_prompt: 'analog login: '
        username: 'root'
        password: 'analog'
      KuiperDLDriver: {}
      MassStorageDriver:
        partition: '/dev/disk/by-partuuid/a22286d2-01'
      BootFPGASoC:
        reached_linux_marker: 'analog'
        wait_for_linux_prompt_timeout: 180
        debug_write_boot_log: true
