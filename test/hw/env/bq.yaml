## pyadi-iio hardware-CI env for ADRV9371 + ZC706 via the `bq` remote
## place on the labgrid coordinator (TFTP boot).
##
## Run locally:
##   labgrid-client -x 10.0.0.41:20408 -p bq acquire
##   LG_COORDINATOR=10.0.0.41:20408 LG_ENV=test/hw/env/bq.yaml \
##     pytest -vs --skip-scan -p no:cacheprovider \
##            -m zynq_zc706_adv7511_adrv9371
##   labgrid-client -x 10.0.0.41:20408 -p bq release
##
## Tests must run on a host with /var/lib/tftpboot reachable (the
## bq runner itself), because the TFTPServerResource is consumed
## locally by TFTPServerDriver.

targets:
  main:
    features:
      - adrv9371
      - zc706
    resources:
      RemotePlace:
        name: bq
      TFTPServerResource:
        address: 'auto'
        port: 3069
        root: /var/lib/tftpboot
    drivers:
      TFTPServerDriver: {}
      KuiperDLDriver: {}
      SerialDriver: {}
      HomeAssistantPowerDriver: {}
      SSHDriver: {}
      ADIShellDriver:
        prompt: 'root@.*'
        login_prompt: 'analog login: '
        username: 'root'
        password: 'analog'
      BootFPGASoCTFTP:
        wait_for_linux_prompt_timeout: 120
        reached_linux_marker: '@analog'
        uboot_prompt: 'Zynq>.*'
        kernel_image_name: 'uImage'
        dtb_image_name: 'devicetree.dtb'
        boot_cmd: 'bootm'
        kernel_addr: '0x3000000'
        dtb_addr: '0x2A00000'
        bootargs: 'console=ttyPS0,115200 root=/dev/mmcblk0p2 rw earlycon rootfstype=ext4 rootwait clk_ignore_unused cpuidle.off=1'
